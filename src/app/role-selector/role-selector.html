<!-- Top Navigation & Theme Toggle -->
<div class="fixed top-4 left-4 z-50">
  <button
    class="flex items-center gap-2 group bg-surface-200/80 backdrop-blur-md border border-border-light/50 px-4 py-2 rounded-xl text-xs font-mono text-neural hover:bg-neural hover:text-background hover:scale-105 transition-all duration-300 shadow-sci-glow"
    (click)="toggleTheme()"
  >
    <lucide-icon *ngIf="themeMode === 'light'" [img]="SunIcon" class="w-4 h-4"></lucide-icon>
    <lucide-icon *ngIf="themeMode === 'dark'" [img]="MoonIcon" class="w-4 h-4"></lucide-icon>
    <span>{{ getThemeLabel() }}</span>
  </button>
</div>

<div class="fixed top-0 left-0 right-0 h-8 bg-surface-300/80 backdrop-blur border-b border-border-light flex items-center justify-between px-4 font-mono text-[10px] z-[9000]">
  <span class="text-text-muted tracking-wider">SCHEMATIC_VIEW: CODESYNC_V2</span>
  <span class="text-memory tracking-wider">SECURE_TCP_CONNECTION_ESTABLISHED</span>
</div>

<!-- Main Sci-Punk Layout -->
<main class="min-h-screen bg-background text-text-primary grid grid-cols-1 lg:grid-cols-[1.2fr_1fr] relative overflow-hidden pt-8 pb-7">
  
  <!-- Glowing Background Orbs -->
  <div class="absolute w-[600px] h-[600px] bg-memory/20 rounded-full blur-[120px] -top-32 -left-32 pointer-events-none animate-pulse duration-[10000ms]"></div>
  <div class="absolute w-[500px] h-[500px] bg-neural/20 rounded-full blur-[120px] -bottom-32 -right-16 pointer-events-none animate-pulse duration-[15000ms]"></div>

  <!-- Left Hero Panel -->
  <section class="relative z-10 flex flex-col justify-center px-12 lg:px-24">
    <header class="mb-16">
      <div class="text-6xl font-black tracking-tighter text-text-primary drop-shadow-lg [text-shadow:0_0_30px_rgba(255,255,255,0.1)]">CODESYNC</div>
      <div class="flex items-center gap-3 mt-4">
        <span class="w-2 h-2 rounded-full bg-neural animate-pulse shadow-[0_0_10px_rgba(0,255,136,0.5)]"></span>
        <span class="font-mono text-xs text-text-secondary tracking-widest">SYS: NORMAL // UPTIME: 99.9%</span>
      </div>
    </header>

    <div class="flex flex-col gap-2 font-display font-black text-5xl lg:text-[64px] leading-[1.1] tracking-tight">
      <h1 class="text-text-primary drop-shadow-md">Code Together.</h1>
      <h1 class="text-text-primary drop-shadow-md">Build Faster.</h1>
      <h1 class="bg-gradient-to-r from-neural to-memory bg-clip-text text-transparent w-max flex items-center">
        Ship {{ displayedWord }}<span class="inline-block w-3 lg:w-4 h-[40px] lg:h-[50px] bg-neural ml-1 animate-pulse"></span>
      </h1>
    </div>

    <!-- Tech Badges -->
    <div class="mt-12 flex flex-wrap gap-4">
      <span class="bg-white/5 backdrop-blur-md border border-white/10 px-4 py-2 rounded-full font-mono text-[11px] tracking-wider hover:bg-white/10 transition-colors cursor-default">[REALTIME_SYNC]</span>
      <span class="bg-white/5 backdrop-blur-md border border-white/10 px-4 py-2 rounded-full font-mono text-[11px] tracking-wider hover:bg-white/10 transition-colors cursor-default">[VIRTUAL_DOM]</span>
      <span class="bg-white/5 backdrop-blur-md border border-white/10 px-4 py-2 rounded-full font-mono text-[11px] tracking-wider hover:bg-white/10 transition-colors cursor-default">[EXECUTION_PIPELINE]</span>
    </div>
  </section>

  <!-- Right Role Selector Panel -->
  <aside class="relative z-10 flex flex-col justify-center px-12 lg:px-20 py-16 lg:py-0 border-t lg:border-t-0 lg:border-l border-white/10 bg-gradient-to-br from-surface-100/40 to-surface-300/80 backdrop-blur-2xl">
    <div class="text-xs font-mono text-text-muted tracking-[0.15em] mb-10 uppercase">
      // Select Execution Profile
    </div>

    <div class="flex flex-col gap-6">
      
      <!-- Guest Card -->
      <button class="group text-left p-8 rounded-2xl bg-white/5 border border-white/10 hover:border-white/20 hover:bg-white/10 transition-all duration-500 hover:-translate-y-1 hover:shadow-card-float relative overflow-hidden" (click)="selectMode('guest')">
        <div class="absolute inset-0 bg-gradient-to-r from-memory/0 via-memory/5 to-memory/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
        <span class="font-mono text-[10px] text-memory tracking-widest opacity-80 block mb-4">PROFILE: GUEST_01</span>
        <div class="flex items-center gap-4 text-memory group-hover:scale-105 transition-transform duration-500">
          <lucide-icon [img]="EyeIcon" class="w-8 h-8"></lucide-icon>
          <span class="text-2xl font-bold text-text-primary tracking-wide">GUEST</span>
        </div>
        <p class="mt-3 text-text-secondary leading-relaxed">Instantly explore public repositories, view code, and test APIs without requiring authentication.</p>
      </button>

      <!-- Developer Card -->
      <button class="group text-left p-8 rounded-2xl bg-white/5 border border-white/10 hover:border-neural/30 hover:bg-white/10 transition-all duration-500 hover:-translate-y-1 hover:shadow-[0_10px_40px_rgba(0,255,136,0.15)] relative overflow-hidden" (click)="selectMode('developer')">
        <div class="absolute inset-0 bg-gradient-to-r from-neural/0 via-neural/10 to-neural/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
        <span class="font-mono text-[10px] text-neural tracking-widest opacity-80 block mb-4">PROFILE: DEV_01</span>
        <div class="flex items-center gap-4 text-neural group-hover:scale-105 transition-transform duration-500">
          <lucide-icon [img]="TerminalIcon" class="w-8 h-8"></lucide-icon>
          <span class="text-2xl font-bold text-text-primary tracking-wide">DEVELOPER</span>
        </div>
        <p class="mt-3 text-text-secondary leading-relaxed">Deploy robust workspaces, clone trending templates, and collaborate on real-time execution pipelines.</p>
      </button>

      <!-- Admin Card -->
      <button class="group text-left p-8 rounded-2xl bg-white/5 border border-white/10 hover:border-white/20 hover:bg-white/10 transition-all duration-500 hover:-translate-y-1 hover:shadow-card-float relative overflow-hidden" (click)="selectMode('admin')">
        <div class="absolute inset-0 bg-gradient-to-r from-red-500/0 via-red-500/5 to-red-500/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-1000"></div>
        <span class="font-mono text-[10px] text-red-500 tracking-widest opacity-80 block mb-4">PROFILE: ROOT_01</span>
        <div class="flex items-center gap-4 text-red-500 group-hover:scale-105 transition-transform duration-500">
          <lucide-icon [img]="ShieldIcon" class="w-8 h-8"></lucide-icon>
          <span class="text-2xl font-bold text-text-primary tracking-wide">ADMIN</span>
        </div>
        <p class="mt-3 text-text-secondary leading-relaxed">Access the root matrix to manage users, monitor deep infrastructure metrics, and enforce policies.</p>
      </button>

    </div>
  </aside>
</main>

<div class="fixed bottom-0 left-0 right-0 h-7 bg-surface-300 border-t border-border-light flex items-center justify-between px-4 font-mono text-[10px] text-text-muted z-[9000]">
  <span>_ WAITING_FOR_INPUT</span>
  <span>v2.0.0.axiom</span>
</div>
