<aside class="sidebar stable" [class.light-mode]="themeMode === 'light'">
  <div class="top-label">Select workspace</div>

  <div class="panel-content">

    <button
      class="role-item"
      type="button"
      *ngFor="let role of options"
      [class.active]="selectedRole === role.key"
      (click)="onRoleSelect(role.key)">
      <span class="role-accent" [class.active]="selectedRole === role.key"></span>
      <span class="role-icon" aria-hidden="true">
        <svg *ngIf="role.key === 'guest'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3.2"></circle>
          <path d="M2.7 12a9.3 9.3 0 0 1 18.6 0"></path>
          <path d="M4.7 17a11.7 11.7 0 0 0 14.6 0"></path>
        </svg>
        <svg *ngIf="role.key === 'developer'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 7 4 12 9 17"></polyline>
          <polyline points="15 7 20 12 15 17"></polyline>
          <line x1="13" y1="5" x2="11" y2="19"></line>
        </svg>
        <svg *ngIf="role.key === 'admin'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 3l7 3v5c0 5.1-3 8-7 10-4-2-7-4.9-7-10V6l7-3z"></path>
          <path d="M9.2 12.2l1.9 1.9 3.8-3.8"></path>
        </svg>
      </span>
      <span class="role-main">
        <span class="role-title">{{ role.key === 'guest' ? 'Guest Access' : (role.key === 'admin' ? 'Administrator' : 'Developer') }}</span>
        <span class="role-desc">{{ role.key === 'guest' ? 'Browse public projects' : (role.key === 'admin' ? 'Platform management' : 'Build and collaborate') }}</span>
      </span>
      <span class="role-arrow" aria-hidden="true">
        &rarr;
      </span>
    </button>
  </div>
</aside>
